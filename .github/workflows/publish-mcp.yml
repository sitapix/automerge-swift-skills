name: Publish MCP

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm instead of only running dry-run checks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: npm install

      - name: Install skills-ref
        run: uv tool install --from git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref skills-ref

      - name: Validate repo
        run: npm run check

      - name: Publish to npm
        if: github.ref_type == 'tag' || github.event.inputs.publish == 'true'
        working-directory: ./mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
